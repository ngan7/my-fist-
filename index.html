<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Mô Hình - GPS Location-based</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-look-at-component.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false" 
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
      
      <a-assets>
        <a-asset-item id="bird-obj" src="./assets/10012_crab_v2_iterations-1.obj"></a-asset-item>
        <a-asset-item id="bird-mtl" src="./assets/10012_crab_v2_iterations-1.mtl"></a-asset-item>
      </a-assets>
      
      <a-obj-model 
        src="#bird-obj" 
        mtl="#bird-mtl" 
        gps-entity-place="latitude: 10.42119; longitude: 105.64335;"
        look-at="[gps-camera]"
        scale="0.05 0.05 0.05"
        position="0 0 0">
      </a-obj-model>
      
      <a-entity gps-camera rotation-reader></a-entity>
      
    </a-scene>
  </body>
</html>
